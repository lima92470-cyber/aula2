<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 2</title>
</head>
<body>
    <form action="">
        <table border="0">
            <tr>
                <td><label for="">Nome:</label></td>
                <td><input type="text" placeholder="Digite seu nome" size="30"></td>
                <td><label for="">Mensagem:</label></td>
                <td rowspan="2"><textarea name="mensagem" id="" cols="10" rows="3"></textarea></td>
            </tr>
            <tr>
                <td><label for="">E-mail:</label></td>
                <td colspan="2"><input type="email" placeholder="Digite seu e-mail" size="42"></td>
            </tr>
            <tr>
                <td colspan="4"><label for="">Sexo:</label>
                <input type="radio" value="Masculino" name="sexo">Masculino
                <input type="radio" value="Feminino" name="sexo">Feminino</td>
            </tr>
            <tr>
                <td colspan="4" align="center"><input type="submit" value="Cadastrar"></td>
            </tr>
        </table>
    </form>
    
</body>
</html>
