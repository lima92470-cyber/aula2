<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body bgcolor="lightblue">
    <h1 align="center">Formulários</h1>
    <hr>
    <form action="" method="">
        <label for="nome">Nome:</label>
        <input type="text" name="name" size="20" maxlength="4" placeholder="Digite seu nome" required>
        <br><br>

        <label for="">Endereço:</label>
        <input type="text" name="endereco" size="30" placeholder="Digite seu endereço" required>
        <br><br>

        <label for="">E-mail:</label>
        <input type="email" name="email" size="25" placeholder="Digite seu e-mail" required>
        <br><br>

        <label for="Senha">Senha:</label>
        <input type="password" maxlength="8" minlength="4"  placeholder="Digite sua Senha" required>
        <br><br>

        <label for="Confirme Senha"> Confirme Senha:</label>
        <input type="password" maxlength="8" minlength="4"  placeholder="Confirme a Senha" name="Conf-Senha" required>
        <br><br>

        <label for="">Data de Nascimento:</label>
        <input type="date" name="dt-nasc">
        <br><br>

        <label for="">Sexo:</label>
        <input type="radio" value="Masculino" name="sexo">Masculino
        <input type="radio" value="Feminino" name="sexo">Feminino
        <br><br>

        <label for="">Estado Civil:</label><br>
        <select name="est-civil" id="" required>
            <option value="">SELECIONE</option>
            <option value="Solteiro">Solteiro(a)</option>
            <option value="Casado">Casado(a)</option>
            <option value="Viuvo">Viúvo(a)</option>
        </select><br><br>

        <label for="">Escolha a Cor:</label>
        <input type="color">
        <br><br>
        <input type="range">

        <h4>Áreas de Interesse Profissional?</h4>
        <input type="checkbox" value="informatica" name="area-inter">
        <label for="">Informática</label>
        <br>
        <input type="checkbox" value="biologia" name="area-inter">
        <label for="">Biologia</label>
        <br>
        <input type="checkbox" value="geografia" name="area-inter">
        <label for="">Geografia</label>
        <br><br>

        <label for="">Deixe aqui seu comentário:</label>
        <textarea name="comentarios" id="" cols="30" rows="10" maxlength="100"></textarea>

        <br><br>
        <input type="submit" value="Enviar Dados">
        <input type="reset" value="Limpar Dados">
    </form>
    
</body>
</html>
